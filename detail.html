<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
    min-height: 100vh;
    padding: 2rem;
}

.content {
    max-width: 1300px;
    margin: 0 auto;
}

.detail-container {
    background: white;
    border-radius: 32px;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Phần hình ảnh */
.detail-img {
    background: linear-gradient(135deg, #f8f9fc 0%, #f0f2f5 100%);
    padding: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

.detail-img img {
    max-width: 100%;
    height: auto;
    max-height: 500px;
    object-fit: contain;
    transition: transform 0.4s ease;
    filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.1));
}

.detail-img img:hover {
    transform: scale(1.05);
}

/* Phần thông tin */
.detail-info {
    padding: 2rem 2rem 2rem 0;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.detail-info h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #1a2c3e;
    line-height: 1.3;
    margin-bottom: 0.5rem;
}

/* Giá tiền */
.price-box {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    background: #fff8f0;
    padding: 1rem 1.5rem;
    border-radius: 20px;
    margin: 0.5rem 0;
}

.original-price {
    font-size: 1.2rem;
    color: #8c9aa8;
    text-decoration: line-through;
}

.discount-price {
    font-size: 2.2rem;
    font-weight: 800;
    color: #e67e22;
}

.discount-badge {
    background: linear-gradient(135deg, #e67e22, #d35400);
    color: white;
    padding: 0.3rem 1rem;
    border-radius: 40px;
    font-size: 0.9rem;
    font-weight: 600;
}

/* Thông số kỹ thuật */
.specs {
    background: #f8fafc;
    border-radius: 24px;
    padding: 1.5rem;
}

.specs h3 {
    font-size: 1.3rem;
    font-weight: 600;
    color: #1a2c3e;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.specs h3:before {
    content: "⚙️";
    font-size: 1.3rem;
}

.specs ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
}

.specs li {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    font-size: 1rem;
    color: #2c3e50;
    padding: 0.5rem 0;
    border-bottom: 1px solid #e2e8f0;
}

.specs li:last-child {
    border-bottom: none;
}

.specs li i {
    width: 28px;
    color: #e67e22;
    font-size: 1.2rem;
}

.specs li strong {
    color: #1a2c3e;
    width: 80px;
}

/* Nút bấm */
.action-buttons {
    display: flex;
    gap: 1rem;
    margin-top: 1rem;
}

.btn-add-cart, .btn-back {
    flex: 1;
    padding: 1rem 1.5rem;
    border: none;
    border-radius: 60px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.8rem;
}

.btn-add-cart {
    background: linear-gradient(135deg, #e67e22, #d35400);
    color: white;
    box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3);
}

.btn-add-cart:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(230, 126, 34, 0.4);
    background: linear-gradient(135deg, #f39c12, #e67e22);
}

.btn-add-cart:active {
    transform: translateY(0);
}

.btn-back {
    background: white;
    color: #1a2c3e;
    border: 2px solid #e2e8f0;
}

.btn-back:hover {
    background: #f8fafc;
    border-color: #e67e22;
    transform: translateY(-2px);
}

.btn-back:active {
    transform: translateY(0);
}

/* Responsive */
@media (max-width: 968px) {
    body {
        padding: 1rem;
    }
    
    .detail-container {
        grid-template-columns: 1fr;
        gap: 0;
    }
    
    .detail-info {
        padding: 1.5rem;
    }
    
    .detail-img {
        padding: 2rem;
    }
    
    .detail-info h1 {
        font-size: 1.5rem;
    }
    
    .discount-price {
        font-size: 1.8rem;
    }
    
    .action-buttons {
        flex-direction: column;
    }
}

@media (max-width: 480px) {
    .price-box {
        flex-direction: column;
        align-items: flex-start;
    }
    
    .specs li {
        flex-wrap: wrap;
    }
    
    .specs li strong {
        width: auto;
    }
}

/* Loading animation */
@keyframes shimmer {
    0% {
        background-position: -1000px 0;
    }
    100% {
        background-position: 1000px 0;
    }
}

.detail-container.loading {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 1000px 100%;
    animation: shimmer 2s infinite;
    min-height: 500px;
}
    </style>
</head>
<body>
    <div class="content">
   
    </div>
    <script src="./deatail.js"></script>
</body>
</html>
